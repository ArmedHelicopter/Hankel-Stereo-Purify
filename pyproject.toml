# Tooling only. Python >= 3.10; runtime pins in requirements.txt; CI: .github/workflows/ci.yml
[tool.ruff]
line-length = 88
fix = true
extend-exclude = ["frontend"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP"]

[tool.mypy]
python_version = "3.10"
strict = true
show_error_codes = true
pretty = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_return_any = true
warn_no_return = true
no_implicit_optional = true
namespace_packages = true

[[tool.mypy.overrides]]
module = [
    "colorlog",
    "soundfile",
    "streamlit",
    "matplotlib",
    "matplotlib.pyplot",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
addopts = [
    "--cov=src",
    "--cov-report=term-missing",
    "--cov-fail-under=74",
]
testpaths = ["tests"]